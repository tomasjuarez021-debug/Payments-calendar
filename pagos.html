<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>mis pagos.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <script id="SAVED_DATA" type="application/json"></script>
  <style>
    :root {
      --bg:      #f8f8f6;
      --white:   #ffffff;
      --border:  #e9e9e6;
      --text:    #1a1a1a;
      --text2:   #6b6b6b;
      --text3:   #b0b0aa;
      --accent:  #1a1a1a;
      --green:   #1a6644;
      --green-bg:#f0f7f3;
      --red:     #c13030;
      --red-bg:  #fdf2f2;
      --amber:   #92600a;
      --amber-bg:#fdf7ee;
      --sans:    'Inter', system-ui, sans-serif;
      --serif:   'Fraunces', Georgia, serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
    button,input,select,textarea{font-family:inherit}
    button{cursor:pointer}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    select option{background:var(--white);color:var(--text)}

    /* ── LAYOUT ── */
    .app{min-height:100vh;display:flex;flex-direction:column}

    .header{
      background:var(--white);
      border-bottom:1px solid var(--border);
      padding:0 24px;
      height:56px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:30;
    }
    .brand{font-family:var(--serif);font-size:20px;font-weight:300;color:var(--text);letter-spacing:-.3px;font-style:italic}
    .header-date{font-size:12px;color:var(--text3);font-weight:400}

    .main{flex:1;padding:24px;max-width:860px;margin:0 auto;width:100%}
    .bottom-nav{display:none}

    /* ── NAV TABS ── */
    .nav-tabs{display:flex;gap:1px;border-bottom:1px solid var(--border);margin-bottom:28px}
    .nav-tab{
      border:none;background:transparent;
      padding:10px 16px;font-size:13px;font-weight:400;
      color:var(--text2);cursor:pointer;
      border-bottom:2px solid transparent;margin-bottom:-1px;
      transition:.12s;white-space:nowrap;
    }
    .nav-tab:hover{color:var(--text)}
    .nav-tab.active{color:var(--text);font-weight:600;border-bottom-color:var(--text)}

    /* ── SECTION HEADER ── */
    .section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px}
    .section-title{font-family:var(--serif);font-size:22px;font-weight:300;font-style:italic;color:var(--text)}
    .section-sub{font-size:12px;color:var(--text3)}

    /* ── CARDS ── */
    .card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:12px}
    .card-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}

    /* ── PAGO ROWS ── */
    .pago-row{
      display:flex;align-items:center;gap:14px;
      padding:14px 0;border-bottom:1px solid var(--border);
    }
    .pago-row:first-child{padding-top:0}
    .pago-row:last-child{border-bottom:none;padding-bottom:0}

    .pago-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .dot-red{background:var(--red)}
    .dot-amber{background:#e6a020}
    .dot-green{background:var(--green)}
    .dot-gray{background:var(--border)}

    .pago-body{flex:1;min-width:0}
    .pago-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pago-sub{font-size:11px;color:var(--text3);margin-top:2px}

    .pago-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .pago-amount{font-size:15px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums}
    .pago-dias{font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;white-space:nowrap}
    .dias-vencido{background:var(--red-bg);color:var(--red)}
    .dias-hoy{background:var(--red-bg);color:var(--red)}
    .dias-urgente{background:var(--amber-bg);color:var(--amber)}
    .dias-proximo{background:var(--amber-bg);color:var(--amber)}
    .dias-ok{background:var(--bg);color:var(--text2)}

    /* ── BOTONES DE PAGO ── */
    .btn-pagar{
      border:1px solid var(--border);background:var(--white);
      color:var(--text2);font-size:11px;font-weight:600;
      padding:5px 10px;border-radius:5px;transition:.12s;
      white-space:nowrap;
    }
    .btn-pagar:hover{background:var(--green);border-color:var(--green);color:#fff}
    .btn-icon{border:none;background:transparent;color:var(--text3);font-size:13px;padding:4px;border-radius:4px;transition:.12s}
    .btn-icon:hover{background:var(--bg);color:var(--text)}

    /* ── FORMS ── */
    .form-stack{display:flex;flex-direction:column;gap:14px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .flabel{display:block;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.3px;margin-bottom:5px}
    .field{
      width:100%;background:var(--bg);
      border:1px solid var(--border);border-radius:7px;
      padding:9px 12px;font-size:14px;color:var(--text);
      outline:none;transition:.12s;
    }
    .field:focus{border-color:var(--text);background:var(--white)}
    .field::placeholder{color:var(--text3)}

    /* ── BUTTONS ── */
    .btn{border:none;border-radius:7px;padding:10px 20px;font-size:13px;font-weight:600;transition:.12s;cursor:pointer}
    .btn-dark{background:var(--text);color:#fff}
    .btn-dark:hover{background:#333}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
    .btn-outline:hover{border-color:var(--text);color:var(--text)}
    .btn-del{background:transparent;border:1px solid var(--border);color:var(--red);font-size:11px;padding:6px 10px;border-radius:5px}
    .btn-del:hover{background:var(--red-bg)}
    .btn-edit-sm{background:transparent;border:1px solid var(--border);color:var(--text2);font-size:11px;padding:5px 9px;border-radius:5px}
    .btn-edit-sm:hover{border-color:var(--text);color:var(--text)}

    /* ── EMPTY ── */
    .empty{padding:48px 24px;text-align:center;color:var(--text3);font-size:13px;line-height:1.6}

    /* ── CALENDAR ── */
    .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .cal-nav-month{font-size:14px;font-weight:600;color:var(--text)}
    .cal-nav-btn{border:none;background:transparent;color:var(--text2);font-size:16px;padding:4px 8px;border-radius:5px;transition:.1s}
    .cal-nav-btn:hover{background:var(--bg)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
    .cal-head{font-size:10px;font-weight:600;color:var(--text3);padding-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
    .cal-cell{
      height:34px;display:flex;flex-direction:column;align-items:center;
      justify-content:center;border-radius:6px;font-size:12px;
      cursor:pointer;transition:.1s;color:var(--text2);position:relative;
    }
    .cal-cell:hover{background:var(--bg)}
    .cal-cell.today{font-weight:700;color:var(--text)}
    .cal-cell.selected{background:var(--text);color:#fff}
    .cal-cell.has-pago::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--amber);position:absolute;bottom:2px}
    .cal-cell.selected::after{background:rgba(255,255,255,.6)}

    /* ── RESUMEN RING ── */
    .ring-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:24px}
    .ring-stats{flex:1;display:flex;flex-direction:column;gap:14px}
    .ring-stat{}
    .ring-stat-val{font-size:24px;font-weight:600;font-variant-numeric:tabular-nums}
    .ring-stat-lbl{font-size:11px;color:var(--text3);margin-top:1px}

    /* ── HISTORIAL GROUP ── */
    .hist-month{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:16px 0 8px}
    .hist-month:first-child{padding-top:0}

    /* ── MODAL ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0}
    .modal{
      background:var(--white);border-radius:16px 16px 0 0;
      padding:24px;width:100%;max-width:500px;
      max-height:92vh;overflow-y:auto;
    }
    .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
    .modal-title{font-family:var(--serif);font-size:18px;font-weight:300;font-style:italic;margin-bottom:18px}

    /* ── CHECKBOX ── */
    .check-row{display:flex;align-items:center;gap:10px}
    .check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--text);cursor:pointer}
    .check-row label{font-size:13px;color:var(--text2);cursor:pointer}

    .hide{display:none!important}

    /* ── MOBILE ── */
    @media(max-width:600px){
      .header{padding:0 16px;height:52px}
      .main{padding:16px;padding-bottom:76px}
      .nav-tabs{display:none}
      .bottom-nav{
        display:flex;position:fixed;bottom:0;left:0;right:0;
        background:var(--white);border-top:1px solid var(--border);
        height:58px;z-index:40;
        padding-bottom:env(safe-area-inset-bottom,0);
      }
      .bottom-nav-btn{
        flex:1;display:flex;flex-direction:column;align-items:center;
        justify-content:center;gap:2px;border:none;background:transparent;
        color:var(--text3);font-size:9px;font-weight:600;
        padding:6px 4px;transition:.12s;letter-spacing:.3px;text-transform:uppercase;
      }
      .bottom-nav-btn .nav-icon{font-size:17px;line-height:1}
      .bottom-nav-btn.active{color:var(--text)}
      .form-row{grid-template-columns:1fr}
      .card{padding:16px}
      .modal{border-radius:20px 20px 0 0}
      .pago-dias{display:none}
    }
  </style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="brand">mis pagos</div>
    <div class="header-date" id="headerFecha"></div>
  </header>

  <nav class="bottom-nav" id="bottomNav"></nav>

  <main class="main">
    <div class="nav-tabs" id="navTabs"></div>

    <section id="tab-pendientes" class="tab-panel"></section>
    <section id="tab-resumen"    class="tab-panel hide"></section>
    <section id="tab-cargar"     class="tab-panel hide"></section>
    <section id="tab-historial"  class="tab-panel hide"></section>
  </main>
</div>

<div id="modalRoot"></div>

<script>
// ── PERSISTENCIA ──
function load(k, fb){
  try {
    const el = document.getElementById('SAVED_DATA');
    if(el && el.textContent.trim()){
      const all = JSON.parse(el.textContent);
      if(all[k] !== undefined) return all[k];
    }
  } catch(e){}
  try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch { return fb; }
}
function save(k, v){
  localStorage.setItem(k, JSON.stringify(v));
}
function downloadHTML(){
  const allData = { mp_pagos: state.pagos, mp_historial: state.historial };
  const html = document.documentElement.outerHTML;
  const block = `<script id="SAVED_DATA" type="application/json">${JSON.stringify(allData)}<\/script>`;
  const updated = '<!DOCTYPE html>\n' + html.replace(/<script id="SAVED_DATA"[^>]*>[\s\S]*?<\/script>/, block);
  const blob = new Blob([updated], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='mis-pagos.html'; a.click();
  URL.revokeObjectURL(url);
  toast('💾 Archivo guardado');
}

// ── UTILS ──
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function esc(s){ return String(s??'').replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function fmt(n, moneda='ARS'){
  const num = Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
  return moneda==='USD' ? `U$D ${num}` : `$${num}`;
}
function diasHasta(fechaStr){
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const fecha = new Date(fechaStr+'T00:00:00');
  return Math.round((fecha - hoy) / 86400000);
}
function addMonths(dateStr, n){
  const d = new Date(dateStr+'T00:00:00');
  d.setMonth(d.getMonth() + n);
  return d.toISOString().split('T')[0];
}
function addDays(dateStr, n){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}
function formatFecha(str){
  const [y,m,d] = str.split('-');
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${d} ${meses[+m-1]} ${y}`;
}
function toast(msg){
  let t = document.getElementById('__toast');
  if(!t){ t=document.createElement('div'); t.id='__toast';
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:.2s;pointer-events:none;white-space:nowrap';
    document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.opacity='0',2200);
}

// ── EMOJIS POR CATEGORÍA ──
const EMOJI = {
  'Luz': '💡', 'Gas': '🔥', 'Agua': '💧', 'Internet': '📡', 'Teléfono': '📱',
  'Alquiler': '🏠', 'Expensas': '🏢', 'Seguro': '🛡️', 'Cuota': '💳',
  'Medicina': '🏥', 'Tarjeta': '💳', 'Suscripción': '📺', 'Otro': '📄'
};
const CATS = Object.keys(EMOJI);
const FRECUENCIAS = [
  {id:'mensual', label:'Mensual'},
  {id:'bimestral', label:'Bimestral'},
  {id:'trimestral', label:'Trimestral'},
  {id:'semestral', label:'Semestral'},
  {id:'anual', label:'Anual'},
  {id:'unico', label:'Único (una vez)'},
];

// ── STATE ──
const state = {
  tab: 'pendientes',
  pagos: load('mp_pagos', []),
  historial: load('mp_historial', []),
  calFecha: todayStr(),
  editingId: null,
};

const TABS = [
  {id:'pendientes', label:'Pendientes', icon:'🔔'},
  {id:'resumen',    label:'Resumen',    icon:'📊'},
  {id:'cargar',     label:'Cargar',     icon:'＋'},
  {id:'historial',  label:'Historial',  icon:'📋'},
];

// ── PRÓXIMA FECHA DE VENCIMIENTO ──
function proximoVenc(pago){
  // Ya tiene próximo vencimiento calculado
  return pago.proximoVenc || pago.fechaInicio;
}

function avanzarVenc(pago){
  const freq = pago.frecuencia;
  const actual = proximoVenc(pago);
  if(freq==='mensual')    return addMonths(actual,1);
  if(freq==='bimestral')  return addMonths(actual,2);
  if(freq==='trimestral') return addMonths(actual,3);
  if(freq==='semestral')  return addMonths(actual,6);
  if(freq==='anual')      return addMonths(actual,12);
  return null; // único
}

// ── RENDER MENU ──
function renderNav(){
  // Desktop tabs
  document.getElementById('navTabs').innerHTML = TABS.map(t=>`
    <button class="nav-tab ${state.tab===t.id?'active':''}" data-tab="${t.id}">${t.label}</button>
  `).join('');
  document.querySelectorAll('.nav-tab').forEach(b=>b.onclick=()=>{ state.tab=b.dataset.tab; render(); });

  // Mobile bottom nav
  document.getElementById('bottomNav').innerHTML = TABS.map(t=>`
    <button class="bottom-nav-btn ${state.tab===t.id?'active':''}" data-tab="${t.id}">
      <span class="nav-icon">${t.icon}</span>
      <span>${t.label}</span>
    </button>
  `).join('');
  document.querySelectorAll('.bottom-nav-btn').forEach(b=>b.onclick=()=>{ state.tab=b.dataset.tab; render(); });

  // Header fecha
  const hoy = new Date();
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('headerFecha').textContent = `${dias[hoy.getDay()]}, ${hoy.getDate()} de ${meses[hoy.getMonth()]}`;
}

// ── CHIP DE DÍAS ──
function diasChip(venc){
  const d = diasHasta(venc);
  if(d < 0)  return `<div class="dias-chip" style="background:var(--red2)"><span class="dias-num" style="color:var(--red)">${Math.abs(d)}</span><span class="dias-label" style="color:var(--red)">vencido</span></div>`;
  if(d === 0) return `<div class="dias-chip" style="background:var(--red2)"><span class="dias-num" style="color:var(--red)">HOY</span><span class="dias-label" style="color:var(--red)">vence</span></div>`;
  if(d <= 3)  return `<div class="dias-chip" style="background:var(--red2)"><span class="dias-num" style="color:var(--red)">${d}</span><span class="dias-label" style="color:var(--red)">días</span></div>`;
  if(d <= 7)  return `<div class="dias-chip" style="background:var(--yellow2)"><span class="dias-num" style="color:var(--yellow)">${d}</span><span class="dias-label" style="color:var(--yellow)">días</span></div>`;
  return `<div class="dias-chip" style="background:var(--surface2)"><span class="dias-num" style="color:var(--text2)">${d}</span><span class="dias-label" style="color:var(--text3)">días</span></div>`;
}

// ── RENDER PENDIENTES ──
function renderPendientes(){
  const root = document.getElementById('tab-pendientes');
  const hoy = todayStr();

  const activos = state.pagos
    .filter(p => p.activo !== false)
    .map(p => ({...p, venc: proximoVenc(p)}))
    .sort((a,b) => diasHasta(a.venc) - diasHasta(b.venc));

  const vencidos = activos.filter(p => diasHasta(p.venc) < 0);
  const hoyVence = activos.filter(p => diasHasta(p.venc) === 0);
  const urgentes = activos.filter(p => diasHasta(p.venc) > 0 && diasHasta(p.venc) <= 3);
  const proximos = activos.filter(p => diasHasta(p.venc) > 3 && diasHasta(p.venc) <= 7);
  const resto    = activos.filter(p => diasHasta(p.venc) > 7);

  function dotClass(d){
    if(d < 0)  return 'dot-red';
    if(d === 0) return 'dot-red';
    if(d <= 3)  return 'dot-amber';
    if(d <= 7)  return 'dot-amber';
    return 'dot-gray';
  }
  function diasLabel(d){
    if(d < 0)   return `<span class="pago-dias dias-vencido">${Math.abs(d)}d vencido</span>`;
    if(d === 0) return `<span class="pago-dias dias-hoy">Hoy</span>`;
    if(d <= 3)  return `<span class="pago-dias dias-urgente">${d}d</span>`;
    if(d <= 7)  return `<span class="pago-dias dias-proximo">${d}d</span>`;
    return `<span class="pago-dias dias-ok">${d}d</span>`;
  }

  function pagoRow(p){
    const d = diasHasta(p.venc);
    const montoStr = p.montoVariable ? '—' : fmt(p.monto, p.moneda);
    return `
      <div class="pago-row">
        <div class="pago-dot ${dotClass(d)}"></div>
        <div class="pago-body">
          <div class="pago-name">${esc(p.nombre)}</div>
          <div class="pago-sub">${formatFecha(p.venc)}${p.delegadoA ? ` · ${esc(p.delegadoA)}` : ''}</div>
        </div>
        <div class="pago-right">
          ${diasLabel(d)}
          <div class="pago-amount">${montoStr}</div>
          <button class="btn-pagar" data-pagar="${p.id}" ${p.montoVariable?'data-variable="1"':''}>Pagado</button>
          <button class="btn-icon" data-editar="${p.id}">✎</button>
        </div>
      </div>`;
  }

  function grupo(label, items){
    if(!items.length) return '';
    return `
      <div style="margin-bottom:4px">
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;padding:12px 0 8px">${label}</div>
        <div class="card" style="margin-bottom:0">${items.map(pagoRow).join('')}</div>
      </div>`;
  }

  // Calendario
  const [yy,mm] = state.calFecha.split('-').map(Number);
  const firstDay = new Date(yy, mm-1, 1).getDay();
  const daysInMonth = new Date(yy, mm, 0).getDate();
  const mesesStr = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const vencMes = new Set(activos.filter(p => p.venc.startsWith(`${yy}-${String(mm).padStart(2,'0')}`)).map(p=>p.venc));

  let cells = ['D','L','M','M','J','V','S'].map(d=>`<div class="cal-head">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++) cells+=`<div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${yy}-${String(mm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls='cal-cell';
    if(ds===state.calFecha) cls+=' selected';
    else if(ds===hoy) cls+=' today';
    if(vencMes.has(ds)) cls+=' has-pago';
    cells+=`<div class="${cls}" data-fecha="${ds}">${d}</div>`;
  }

  const selPagos = activos.filter(p=>p.venc===state.calFecha);

  root.innerHTML = `
    <div class="card" style="margin-bottom:20px">
      <div class="cal-nav">
        <button class="cal-nav-btn" id="calPrev">‹</button>
        <span class="cal-nav-month">${mesesStr[mm-1]} ${yy}</span>
        <button class="cal-nav-btn" id="calNext">›</button>
      </div>
      <div class="cal-grid">${cells}</div>
      ${selPagos.length ? `
        <div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px">
          <div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">${formatFecha(state.calFecha)}</div>
          ${selPagos.map(p=>`
            <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:13px;font-weight:500">${esc(p.nombre)}</span>
              <span style="font-size:13px;color:var(--text2)">${p.montoVariable?'variable':fmt(p.monto,p.moneda)}</span>
            </div>`).join('')}
        </div>` : ''}
    </div>

    ${!activos.length ? `<div class="empty">Todavía no cargaste ningún pago.<br>Andá a <b>Cargar</b> para empezar.</div>` : ''}
    ${grupo('Vencidos', vencidos)}
    ${grupo('Hoy', hoyVence)}
    ${grupo('Próximos 3 días', urgentes)}
    ${grupo('Esta semana', proximos)}
    ${grupo('Más adelante', resto)}
  `;

  root.querySelectorAll('[data-fecha]').forEach(el=>el.onclick=()=>{ state.calFecha=el.dataset.fecha; renderPendientes(); });
  root.querySelector('#calPrev').onclick=()=>{ const d=new Date(yy,mm-2,1); state.calFecha=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`; renderPendientes(); };
  root.querySelector('#calNext').onclick=()=>{ const d=new Date(yy,mm,1); state.calFecha=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`; renderPendientes(); };

  root.querySelectorAll('[data-pagar]').forEach(btn=>btn.onclick=()=>{
    const id = Number(btn.dataset.pagar);
    const esVariable = btn.dataset.variable === '1';
    if(esVariable){
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal">
          <div class="modal-handle"></div>
          <div class="modal-title">¿Cuánto pagaste?</div>
          <div class="form-stack">
            <div><label class="flabel">Monto</label><input id="montoVariableInput" class="field" type="number" placeholder="0.00" step="0.01" inputmode="decimal"></div>
            <div style="display:flex;gap:8px">
              <button id="montoVariableOk" class="btn btn-dark" style="flex:1">Confirmar</button>
              <button id="montoVariableCancel" class="btn btn-outline">Cancelar</button>
            </div>
          </div>
        </div>`;
      document.getElementById('modalRoot').appendChild(overlay);
      const input = overlay.querySelector('#montoVariableInput');
      setTimeout(()=>input.focus(), 100);
      overlay.querySelector('#montoVariableCancel').onclick=()=>overlay.remove();
      overlay.onclick=e=>{ if(e.target===overlay) overlay.remove(); };
      overlay.querySelector('#montoVariableOk').onclick=()=>{
        const monto=Number(input.value);
        if(!monto||monto<=0){ toast('Ingresá un monto válido'); return; }
        overlay.remove(); registrarPago(id, monto);
      };
      input.onkeydown=e=>{ if(e.key==='Enter') overlay.querySelector('#montoVariableOk').click(); };
    } else { registrarPago(id); }
  });

  root.querySelectorAll('[data-editar]').forEach(btn=>btn.onclick=()=>abrirModalEditar(Number(btn.dataset.editar)));
}

function registrarPago(id, montoOverride){
  try {
    const pago = state.pagos.find(p=>p.id===id);
    if(!pago){ toast('Error: pago no encontrado'); return; }
    const venc = proximoVenc(pago);
    if(!venc){ toast('Error: fecha de vencimiento inválida'); return; }
    const montoReal = montoOverride !== undefined ? montoOverride : Number(pago.monto||0);

    // Agregar al historial
    state.historial.unshift({
      id: Date.now(),
      pagoId: id,
      nombre: pago.nombre,
      categoria: pago.categoria,
      monto: montoReal,
      moneda: pago.moneda,
      fecha: todayStr(),
      fechaVenc: venc,
    });
    save('mp_historial', state.historial);

    // Avanzar próximo vencimiento
    const siguiente = avanzarVenc(pago);
    if(siguiente){
      pago.proximoVenc = siguiente;
    } else {
      pago.activo = false; // único — se desactiva
    }
    save('mp_pagos', state.pagos);
    toast(`✓ ${pago.nombre} registrado como pagado`);
    render();
  } catch(e){
    console.error('Error en registrarPago:', e);
    toast('Error al registrar el pago. Intentá de nuevo.');
  }
}

// ── RENDER RESUMEN ──
function renderResumen(){
  const root = document.getElementById('tab-resumen');
  const hoy = new Date();
  const mesKey = `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}`;
  const mesesStr = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  const histMes = state.historial.filter(h=>h.fecha.startsWith(mesKey));
  const totalMesARS = histMes.filter(h=>h.moneda!=='USD').reduce((a,h)=>a+Number(h.monto),0);
  const totalMesUSD = histMes.filter(h=>h.moneda==='USD').reduce((a,h)=>a+Number(h.monto),0);
  const cantPagados = histMes.length;

  // Pagos pendientes este mes
  const activos = state.pagos.filter(p=>p.activo!==false);
  const pendMes = activos.filter(p=>proximoVenc(p).startsWith(mesKey));
  const totalPendARS = pendMes.filter(p=>p.moneda!=='USD'&&!p.montoVariable).reduce((a,p)=>a+Number(p.monto),0);

  // Porcentaje de actividad: pagados / (pagados + pendientes)
  const totalActividad = cantPagados + pendMes.length;
  const pctActividad = totalActividad > 0 ? Math.round(cantPagados / totalActividad * 100) : 0;

  // SVG ring
  const r = 54, circ = 2 * Math.PI * r;
  const dash = (pctActividad / 100) * circ;

  // Por categoría este mes
  const porCat = {};
  histMes.forEach(h=>{ if(h.moneda!=='USD') porCat[h.categoria]=(porCat[h.categoria]||0)+Number(h.monto); });
  const cats = Object.entries(porCat).sort((a,b)=>b[1]-a[1]);

  root.innerHTML = `
    <div style="font-family:var(--serif);font-size:20px;font-weight:600;margin-bottom:16px;color:var(--text)">
      ${mesesStr[hoy.getMonth()]} ${hoy.getFullYear()}

    <!-- Card principal con ring -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <!-- Ring de actividad -->
        <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="12"/>
            <circle cx="70" cy="70" r="${r}" fill="none" stroke="${pctActividad===100?'var(--green)':pctActividad>=50?'var(--accent)':'var(--red)'}"
              stroke-width="12" stroke-linecap="round"
              stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"
              transform="rotate(-90 70 70)"/>
            <text x="70" y="65" text-anchor="middle" font-family="'Playfair Display',serif" font-size="24" font-weight="600" fill="var(--text)">${pctActividad}%</text>
            <text x="70" y="82" text-anchor="middle" font-family="Lato,sans-serif" font-size="11" fill="var(--text3)">pagados</text>
          </svg>
        </div>
        <!-- Stats al lado del ring -->
        <div style="flex:1;display:flex;flex-direction:column;gap:12px">
          <div>
            <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Realizados este mes</div>
            <div style="font-family:var(--serif);font-size:22px;font-weight:600;color:var(--green)">${cantPagados} pago${cantPagados!==1?'s':''}</div>
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Pendientes</div>
            <div style="font-family:var(--serif);font-size:22px;font-weight:600;color:${pendMes.length>0?'var(--red)':'var(--green)'}">${pendMes.length} pago${pendMes.length!==1?'s':''}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Montos -->
    <div class="stats-grid" style="margin-bottom:14px">
      <div class="stat-box">
        <div class="stat-num" style="color:var(--green);font-size:18px">${fmt(totalMesARS)}</div>
        <div class="stat-lbl">Pagado (ARS)</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" style="color:var(--red);font-size:18px">${fmt(totalPendARS)}</div>
        <div class="stat-lbl">Pendiente (ARS)</div>
      </div>
      ${totalMesUSD > 0 ? `
      <div class="stat-box">
        <div class="stat-num" style="color:var(--blue);font-size:18px">${fmt(totalMesUSD,'USD')}</div>
        <div class="stat-lbl">Pagado (USD)</div>
      </div>` : ''}
    </div>

    ${cats.length ? `
    <div class="card" style="margin-bottom:12px">
      <div class="card-label">Gastos por categoría</div>
      ${cats.map(([cat,monto])=>{
        const pct = totalMesARS > 0 ? (monto/totalMesARS*100) : 0;
        return `
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
            <span style="font-size:22px">${EMOJI[cat]||'📄'}</span>
            <div style="flex:1">
              <div style="display:flex;justify-content:space-between;margin-bottom:5px">
                <span style="font-size:13px;font-weight:700">${esc(cat)}</span>
                <span style="font-family:var(--serif);font-weight:600;font-size:14px">${fmt(monto)}</span>
              </div>
              <div style="height:6px;background:var(--surface2);border-radius:6px;overflow:hidden">
                <div style="height:100%;width:${pct.toFixed(1)}%;background:var(--accent);border-radius:6px;transition:.3s"></div>
              </div>

          <div class="pago-icon" style="background:var(--accent2)">${EMOJI[p.categoria]||'📄'}</div>
          <div class="pago-info">

          </div>
          <div class="pago-monto">${p.montoVariable?'variable':fmt(p.monto,p.moneda)}</div>
        </div>`).join('')}
    </div>` : cantPagados > 0 ? `<div class="card" style="text-align:center;padding:20px"><span style="font-size:28px">🎉</span><div style="font-family:var(--serif);font-size:16px;margin-top:8px;color:var(--green)">¡Todo al día este mes!</div></div>` : ''}
  `;
}

// ── RENDER HISTORIAL ──
function renderHistorial(){
  const root = document.getElementById('tab-historial');
  if(!state.historial.length){
    root.innerHTML = `<div class="empty">Todavía no registraste ningún pago.</div>`;
    return;
  }

  const grupos = {};
  state.historial.forEach(h=>{
    const [y,m] = h.fecha.split('-');
    const key = `${y}-${m}`;
    if(!grupos[key]) grupos[key]=[];
    grupos[key].push(h);
  });
  const mesesStr = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  root.innerHTML = Object.keys(grupos).sort((a,b)=>b.localeCompare(a)).map(key=>{
    const [y,m] = key.split('-');
    const items = grupos[key];
    const totalARS = items.filter(h=>h.moneda!=='USD').reduce((a,h)=>a+Number(h.monto),0);
    return `
      <div class="card">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px">
          <div style="font-size:15px;font-weight:600;color:var(--text)">${mesesStr[+m-1]} ${y}</div>
          <div style="font-size:13px;color:var(--text2)">${fmt(totalARS)}</div>
        </div>
        ${items.map(h=>`
          <div class="pago-row">
            <div class="pago-dot dot-green"></div>
            <div class="pago-body">
              <div class="pago-name">${esc(h.nombre)}</div>
              <div class="pago-sub">Pagado ${formatFecha(h.fecha)}</div>
            </div>
            <div class="pago-right">
              <span style="font-size:14px;font-weight:600;color:var(--green)">${fmt(h.monto,h.moneda)}</span>
              <button class="btn-icon" data-del-hist="${h.id}" style="color:var(--text3)">✕</button>
            </div>
          </div>`).join('')}
      </div>`;
  }).join('');

  root.querySelectorAll('[data-del-hist]').forEach(btn=>btn.onclick=()=>{
    state.historial = state.historial.filter(h=>String(h.id)!==btn.dataset.delHist);
    save('mp_historial', state.historial);
    renderHistorial();
  });
}

        </div>
        <div style="display:flex;gap:8px;margin-top:4px">
          <button id="eGuardar" class="btn btn-dark" style="flex:1">Guardar</button>
          <button id="eCancelar" class="btn btn-outline">Cancelar</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modalRoot').appendChild(overlay);

  overlay.querySelector('#eCancelar').onclick=()=>overlay.remove();
  overlay.onclick=e=>{ if(e.target===overlay) overlay.remove(); };
  overlay.querySelector('#eGuardar').onclick=()=>{
    p.nombre      = overlay.querySelector('#eNombre').value.trim() || p.nombre;
    p.categoria   = overlay.querySelector('#eCat').value;
    p.frecuencia  = overlay.querySelector('#eFreq').value;
    p.proximoVenc = overlay.querySelector('#eFecha').value;
    p.moneda      = overlay.querySelector('#eMoneda').value;
    p.monto       = Number(overlay.querySelector('#eMonto').value||0);
    p.montoVariable = overlay.querySelector('#eVariable').checked;
    p.delegadoA   = overlay.querySelector('#eDelegado').value.trim() || null;
    save('mp_pagos', state.pagos);
    overlay.remove();
    toast('✓ Cambios guardados');
    render();
  };
}

// ── RENDER PRINCIPAL ──
function render(){
  renderNav();
  document.querySelectorAll('.tab-panel').forEach(el=>el.classList.add('hide'));
  document.getElementById('tab-'+state.tab).classList.remove('hide');
  if(state.tab==='pendientes') renderPendientes();
  if(state.tab==='resumen')    renderResumen();
  if(state.tab==='cargar')     renderCargar();
  if(state.tab==='historial')  renderHistorial();
}

render();
</script>
</body>
</html>
